<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>光影行旅</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #1f211f;
      --muted: #747166;
      --line: rgba(31, 33, 31, .13);
      --paper: rgba(255, 253, 247, .72);
      --shadow: 0 24px 70px rgba(34, 31, 26, .16);
      --ease: cubic-bezier(.2, .7, .2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button {
      font: inherit;
      color: inherit;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .page {
      width: min(1180px, calc(100% - 38px));
      margin: 0 auto;
    }

    .hero {
      min-height: 46vh;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 28px;
      align-items: end;
      padding: 54px 0 34px;
      border-bottom: 1px solid var(--line);
    }

    .kicker {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .16em;
    }

    h1 {
      margin: 0;
      max-width: 820px;
      font-size: clamp(44px, 7vw, 92px);
      line-height: .96;
      font-weight: 520;
    }

    .intro {
      max-width: 360px;
      margin: 0;
      color: #555147;
      font-size: 15px;
      line-height: 1.9;
    }

    .category-stage {
      padding: 36px 0 74px;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .category-card {
      position: relative;
      min-height: 520px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: 0 12px 34px rgba(34, 31, 26, .08);
      transition: transform .45s var(--ease), box-shadow .45s var(--ease);
    }

    .category-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
    }

    .cover-collage {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1.05fr .72fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 8px;
      filter: saturate(.96);
    }

    .cover-collage img {
      min-height: 0;
      opacity: .95;
      transition: transform .8s var(--ease), opacity .8s var(--ease);
    }

    .cover-collage img:first-child {
      grid-row: span 2;
    }

    .category-card:hover img:first-child { transform: scale(1.045); }
    .category-card:hover img:nth-child(2) { transform: translateY(-8px) scale(1.035); }
    .category-card:hover img:nth-child(3) { transform: translateY(8px) scale(1.035); }

    .cover-shade {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(244,241,234,0) 28%, rgba(12,13,12,.6) 100%);
    }

    .card-copy {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 22px;
      color: #fff;
      text-align: left;
      text-shadow: 0 1px 18px rgba(0,0,0,.28);
    }

    .card-copy small {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      letter-spacing: .12em;
      text-transform: uppercase;
      opacity: .82;
    }

    .card-copy strong {
      display: block;
      font-size: clamp(28px, 3vw, 44px);
      line-height: 1;
      font-weight: 520;
    }

    .card-copy span {
      display: block;
      max-width: 260px;
      margin-top: 13px;
      font-size: 13px;
      line-height: 1.7;
      opacity: .86;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: minmax(260px, 360px) 1fr;
      gap: 0;
      background: #121310;
      color: #f5f0e8;
      opacity: 0;
      pointer-events: none;
      transform: scale(.985);
      transition: opacity .36s var(--ease), transform .36s var(--ease);
    }

    .viewer.open {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .side {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 32px;
      border-right: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.035);
    }

    .back {
      align-self: flex-start;
      min-height: 38px;
      padding: 0 13px;
      color: #f5f0e8;
      border: 1px solid rgba(255,255,255,.24);
    }

    .viewer h2 {
      margin: 22px 0 14px;
      font-size: clamp(38px, 5vw, 72px);
      line-height: .95;
      font-weight: 520;
    }

    .viewer p {
      margin: 0;
      color: rgba(245,240,232,.68);
      font-size: 14px;
      line-height: 1.85;
    }

    .counter {
      margin-top: 28px;
      color: rgba(245,240,232,.66);
      font-size: 13px;
    }

    .thumb-rail {
      display: flex;
      gap: 8px;
      margin-top: 28px;
      overflow: hidden;
    }

    .rail-dot {
      width: 26px;
      height: 4px;
      background: rgba(255,255,255,.26);
      transition: width .3s var(--ease), background .3s var(--ease);
    }

    .rail-dot.active {
      width: 46px;
      background: #f5f0e8;
    }

    .photo-stage {
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .photo-layer {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      opacity: 0;
      transform: scale(1.04) translateX(28px);
      transition: opacity .55s var(--ease), transform .75s var(--ease), filter .75s var(--ease);
      filter: blur(8px);
    }

    .photo-layer.active {
      opacity: 1;
      transform: scale(1) translateX(0);
      filter: blur(0);
    }

    .photo-layer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #0f100e;
    }

    .caption {
      position: absolute;
      left: 28px;
      bottom: 26px;
      padding: 10px 13px;
      color: #fff;
      background: rgba(0,0,0,.36);
      backdrop-filter: blur(12px);
      font-size: 14px;
    }

    .hint {
      color: rgba(245,240,232,.5);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .intro {
        max-width: 620px;
      }

      .categories {
        grid-template-columns: 1fr;
      }

      .category-card {
        min-height: 430px;
      }

      .viewer {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .side {
        padding: 20px;
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,.12);
      }

      .viewer h2 {
        margin: 14px 0 8px;
      }

      .thumb-rail {
        margin-top: 14px;
      }
    }

    @media (max-width: 560px) {
      .viewer {
        height: 100dvh;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
      }

      .side {
        padding: max(14px, env(safe-area-inset-top)) 18px 14px;
        gap: 12px;
      }

      .back {
        min-height: 34px;
        padding: 0 12px;
        font-size: 15px;
      }

      .viewer h2 {
        margin: 16px 0 8px;
        font-size: 44px;
        line-height: 1;
      }

      .viewer p {
        max-width: 92vw;
        font-size: 13px;
        line-height: 1.55;
      }

      .counter {
        margin-top: 16px;
        font-size: 13px;
      }

      .thumb-rail {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(16px, 1fr));
        gap: 5px;
        width: 100%;
        margin-top: 10px;
        overflow: visible;
      }

      .rail-dot,
      .rail-dot.active {
        width: auto;
        height: 3px;
      }

      .hint {
        font-size: 11px;
        line-height: 1.45;
      }

      .photo-stage {
        display: grid;
        place-items: center;
        min-height: 0;
        padding: 12px 10px calc(18px + env(safe-area-inset-bottom));
      }

      .photo-layer {
        inset: 12px 10px calc(18px + env(safe-area-inset-bottom));
      }

      .photo-layer img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .caption {
        left: 18px;
        bottom: calc(26px + env(safe-area-inset-bottom));
        max-width: calc(100% - 36px);
        padding: 8px 11px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <p class="kicker">Photography Portfolio</p>
        <h1>光影行旅</h1>
      </div>
      <p class="intro">在街道的微光、旷野的风声与人群的片刻停留之间，记录旅途中被看见的秩序、温度和远方。</p>
    </section>

    <section class="category-stage">
      <div class="categories" id="categories"></div>
    </section>
  </main>

  <section class="viewer" id="viewer" aria-label="分类照片浏览">
    <aside class="side">
      <div>
        <button class="back" id="back">返回分类</button>
        <h2 id="viewerTitle"></h2>
        <p id="viewerDesc"></p>
        <div class="counter" id="counter"></div>
        <div class="thumb-rail" id="rail"></div>
      </div>
      <div class="hint">在右侧照片区域移动鼠标即可切换作品；按 Esc 返回分类。</div>
    </aside>
    <div class="photo-stage" id="photoStage">
      <div id="layers"></div>
      <div class="caption" id="caption"></div>
    </div>
  </section>

  <script>
    const groups = [
      {
        key: "city",
        title: "城市",
        label: "City",
        desc: "街道、地标、路口与夜色里的城市节奏。",
        cover: ["photo-34.jpg", "photo-45.jpg", "photo-47.jpg"],
        photos: [
          ["photo-01.jpg", "雨后街角"],
          ["photo-20.jpg", "旷野公路"],
          ["photo-23.jpg", "节日街灯"],
          ["photo-28.jpg", "街道午后"],
          ["photo-34.jpg", "港城夜景"],
          ["photo-45.jpg", "雨夜路口"],
          ["photo-47.jpg", "红桥夜线"]
        ]
      },
      {
        key: "landscape",
        title: "风景",
        label: "Landscape",
        desc: "海岸、冰川、雪山、极光与开阔地貌。",
        cover: ["photo-42.jpg", "photo-08.jpg", "photo-44.jpg"],
        photos: [
          ["photo-03.jpg", "蓝色远城"],
          ["photo-06.jpg", "树影草地"],
          ["photo-07.jpg", "山路标识"],
          ["photo-08.jpg", "白崖海岸"],
          ["photo-09.jpg", "秋色山谷"],
          ["photo-10.jpg", "冷海岸线"],
          ["photo-11.jpg", "雪畔游船"],
          ["photo-13.jpg", "湖边建筑"],
          ["photo-14.jpg", "薄雾山湖"],
          ["photo-22.jpg", "崖边村落"],
          ["photo-27.jpg", "黑沙海岸"],
          ["photo-29.jpg", "落日海湾"],
          ["photo-32.jpg", "雪山海岸"],
          ["photo-33.jpg", "橙色湖面"],
          ["photo-38.jpg", "湖边夕照"],
          ["photo-39.jpg", "绿色极光"],
          ["photo-40.jpg", "冰河纹理"],
          ["photo-41.jpg", "冰原行人"],
          ["photo-42.jpg", "蓝冰峡谷"],
          ["photo-43.jpg", "山前黄衣"],
          ["photo-44.jpg", "极光山影"]
        ]
      },
      {
        key: "human",
        title: "人文",
        label: "Human",
        desc: "建筑空间中的观看、行走与旅行中的日常片刻。",
        cover: ["photo-02.jpg", "photo-19.jpg", "photo-18.jpg"],
        photos: [
          ["photo-02.jpg", "阶梯人流"],
          ["photo-05.jpg", "教堂回响"],
          ["photo-12.jpg", "暮色街灯"],
          ["photo-16.jpg", "车窗之外"],
          ["photo-17.jpg", "树下片刻"],
          ["photo-18.jpg", "海边散步"],
          ["photo-19.jpg", "展厅凝望"],
          ["photo-21.jpg", "名画前"],
          ["photo-26.jpg", "钟楼剪影"],
          ["photo-35.jpg", "吧台微光"]
        ]
      }
    ];

    const categories = document.querySelector("#categories");
    const viewer = document.querySelector("#viewer");
    const viewerTitle = document.querySelector("#viewerTitle");
    const viewerDesc = document.querySelector("#viewerDesc");
    const counter = document.querySelector("#counter");
    const rail = document.querySelector("#rail");
    const layers = document.querySelector("#layers");
    const caption = document.querySelector("#caption");
    const photoStage = document.querySelector("#photoStage");
    let activeGroup = null;
    let activeIndex = 0;
    let lastIndex = -1;

    categories.innerHTML = groups.map(group => `
      <button class="category-card" data-group="${group.key}">
        <span class="cover-collage">
          ${group.cover.map(file => `<img src="thumbs/${file}" alt="">`).join("")}
        </span>
        <span class="cover-shade"></span>
        <span class="card-copy">
          <small>${group.label} · ${group.photos.length} 张</small>
          <strong>${group.title}</strong>
          <span>${group.desc}</span>
        </span>
      </button>
    `).join("");

    function openGroup(group) {
      activeGroup = group;
      activeIndex = 0;
      lastIndex = -1;
      viewerTitle.textContent = group.title;
      viewerDesc.textContent = group.desc;
      layers.innerHTML = group.photos.map(([file, title], index) => `
        <div class="photo-layer ${index === 0 ? "active" : ""}">
          <img src="thumbs/${file}" alt="${title}">
        </div>
      `).join("");
      rail.innerHTML = group.photos.map((_, index) => `<span class="rail-dot ${index === 0 ? "active" : ""}"></span>`).join("");
      viewer.classList.add("open");
      setActive(0);
    }

    function setActive(index) {
      if (!activeGroup || index === lastIndex) return;
      lastIndex = index;
      activeIndex = index;
      const allLayers = [...document.querySelectorAll(".photo-layer")];
      const dots = [...document.querySelectorAll(".rail-dot")];
      allLayers.forEach((layer, i) => layer.classList.toggle("active", i === index));
      dots.forEach((dot, i) => dot.classList.toggle("active", i === index));
      const title = activeGroup.photos[index][1];
      caption.textContent = title;
      counter.textContent = `${String(index + 1).padStart(2, "0")} / ${String(activeGroup.photos.length).padStart(2, "0")}`;
    }

    function closeViewer() {
      viewer.classList.remove("open");
      activeGroup = null;
    }

    categories.addEventListener("click", event => {
      const card = event.target.closest(".category-card");
      if (!card) return;
      openGroup(groups.find(group => group.key === card.dataset.group));
    });

    photoStage.addEventListener("mousemove", event => {
      if (!activeGroup) return;
      const rect = photoStage.getBoundingClientRect();
      const progress = Math.min(0.999, Math.max(0, (event.clientX - rect.left) / rect.width));
      const index = Math.floor(progress * activeGroup.photos.length);
      requestAnimationFrame(() => setActive(index));
    });

    photoStage.addEventListener("touchmove", event => {
      if (!activeGroup || !event.touches[0]) return;
      const rect = photoStage.getBoundingClientRect();
      const progress = Math.min(0.999, Math.max(0, (event.touches[0].clientX - rect.left) / rect.width));
      setActive(Math.floor(progress * activeGroup.photos.length));
    }, { passive: true });

    document.querySelector("#back").addEventListener("click", closeViewer);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeViewer();
    });
  </script>
</body>
</html>
